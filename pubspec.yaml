name: nova
description: "NOVA Automotive Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.6

  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.1
  firebase_messaging: ^16.2.2
  flutter_local_notifications: ^21.0.0

  google_sign_in: ^6.3.0

  camera: ^0.11.0+2
  image_picker: ^1.2.2
  image_cropper: ^8.0.2
  gallery_saver_plus: ^3.2.4
  path_provider: ^2.1.5

  url_launcher: ^6.3.1
  share_plus: ^10.1.4

  image: ^4.8.0
  video_player: ^2.9.2
  http: ^1.2.2

  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/google.png
    - assets/images/
    - assets/images/menu/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png

flutter_native_splash:
  color: "#000000"
  image: assets/images/logo.png
  android: true
  ios: true
  fullscreen: true

  android_12:
    color: "#000000"
    image: assets/images/logo.png